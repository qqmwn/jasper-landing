<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 — Jasper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --primary:#725BFF;--primary-hover:#5F47E0;--cta:#FF6B35;
            --text-dark:#0F172A;--text-light:#64748B;
            --bg-light:#F8FAFC;--border:#E2E8F0;--white:#FFFFFF;
            --error:#EF4444;--success:#22C55E
        }
        body{font-family:'Inter',sans-serif;color:var(--text-dark);background:#FAFBFC;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
        .page{display:flex;width:100%;max-width:1040px;background:var(--white);border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,0.06);overflow:hidden}
        .brand-panel{flex:1;background:linear-gradient(135deg,#725BFF,#5F47E0);color:var(--white);padding:64px 48px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
        .brand-panel::after{content:'';position:absolute;top:-50%;right:-50%;width:100%;height:100%;background:rgba(255,255,255,0.05);border-radius:50%}
        .brand-panel::before{content:'';position:absolute;bottom:-30%;left:-30%;width:80%;height:80%;background:rgba(255,255,255,0.03);border-radius:50%}
        .brand-logo{position:relative;z-index:1;font-size:28px;font-weight:700;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--white)}
        .brand-logo-dot{width:10px;height:10px;border-radius:50%;background:var(--white)}
        .brand-text{position:relative;z-index:1}
        .brand-text h2{font-size:32px;font-weight:700;line-height:1.3;margin-bottom:12px}
        .brand-text p{font-size:16px;opacity:0.85;line-height:1.6}
        .brand-features{position:relative;z-index:1;display:flex;flex-direction:column;gap:16px}
        .brand-feature{display:flex;align-items:center;gap:12px;font-size:15px}
        .brand-check{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .brand-check svg{width:14px;height:14px}
        .form-panel{flex:1;padding:64px 64px 64px 56px;display:flex;flex-direction:column;justify-content:center}
        .form-panel h1{font-size:28px;font-weight:700;margin-bottom:8px}
        .form-panel .subtitle{color:var(--text-light);font-size:15px;margin-bottom:36px}
        .form-group{margin-bottom:20px;position:relative}
        .form-group label{display:block;font-size:14px;font-weight:600;margin-bottom:6px;color:var(--text-dark)}
        .form-group input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;color:var(--text-dark);transition:border-color .2s,box-shadow .2s;outline:none}
        .form-group input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(114,91,255,0.1)}
        .form-group input.input-error{border-color:var(--error);box-shadow:0 0 0 3px rgba(239,68,68,0.1)}
        .form-group input::placeholder{color:#94A3B8}
        .field-hint{font-size:12px;color:var(--error);margin-top:4px;display:none}
        .field-hint.show{display:block}
        .btn{width:100%;padding:14px 24px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-family:inherit;margin-top:8px}
        .btn-primary{background:var(--primary);color:var(--white)}
        .btn-primary:hover{background:var(--primary-hover);transform:translateY(-1px);box-shadow:0 4px 12px rgba(114,91,255,0.3)}
        .btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none;box-shadow:none}
        .form-footer{text-align:center;margin-top:24px;font-size:14px;color:var(--text-light)}
        .form-footer a{color:var(--primary);text-decoration:none;font-weight:600;cursor:pointer}
        .form-footer a:hover{text-decoration:underline}
        .msg{display:none;padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px;font-weight:500}
        .msg.error{display:block;background:#FEF2F2;color:var(--error);border:1px solid #FECACA}
        .msg.success{display:block;background:#F0FDF4;color:var(--success);border:1px solid #BBF7D0}
        @media(max-width:768px){
            .page{flex-direction:column;max-width:420px}
            .brand-panel{padding:40px 32px;text-align:center}
            .brand-features{display:none}
            .brand-text h2{font-size:24px}
            .form-panel{padding:32px 32px 48px}
        }
    </style>
</head>
<body>
<div class="page">
    <div class="brand-panel">
        <a href="index.html" class="brand-logo">Jasper<span class="brand-logo-dot"></span></a>
        <div class="brand-text">
            <h2>开始 7 天免费试用</h2>
            <p>加入超过 10 万个营销团队，使用 Jasper 规模化内容生产。</p>
        </div>
        <div class="brand-features">
            <div class="brand-feature"><div class="brand-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>无需信用卡</div>
            <div class="brand-feature"><div class="brand-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>全部 Pro 功能开放</div>
            <div class="brand-feature"><div class="brand-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>随时可取消</div>
        </div>
    </div>

    <div class="form-panel">
        <h1>创建账号</h1>
        <p class="subtitle">开始免费试用</p>

        <div class="msg" id="msg"></div>

        <div class="form-group">
            <label>姓名</label>
            <input type="text" id="name" placeholder="张三" autocomplete="name" oninput="validateName()" onblur="validateName()">
            <div class="field-hint" id="nameHint">请输入姓名</div>
        </div>

        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="email" placeholder="zhangsan@company.com" autocomplete="email" oninput="validateEmail()" onblur="validateEmail()">
            <div class="field-hint" id="emailHint">请输入有效的邮箱地址</div>
        </div>

        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="至少 8 位，不能纯数字或纯字母" autocomplete="new-password" oninput="validatePw()">
            <div class="field-hint" id="pwHint">密码至少需要 8 个字符</div>
        </div>

        <button class="btn btn-primary" id="submitBtn" onclick="handleSignUp()">开始免费试用</button>

        <p class="form-footer">
            已有账号？ <a href="signin.html">登录</a>
        </p>
    </div>
</div>

<script>
const API='';
function showMsg(t,e){const m=document.getElementById('msg');m.textContent=t;m.className='msg '+e}
function showHint(id,s){document.getElementById(id).classList.toggle('show',!!s)}
function markInput(id,e){document.getElementById(id).classList.toggle('input-error',!!e)}

function validateName(){
    const v=document.getElementById('name').value.trim();
    const ok=v.length>0;
    showHint('nameHint',!ok);markInput('name',!ok&&document.getElementById('name').value.length>0);return ok
}
function validateEmail(){
    const v=document.getElementById('email').value.trim();
    const ok=v&&/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    showHint('emailHint',!ok);markInput('email',!ok&&v.length>0);return ok
}
function validatePw(){
    const v=document.getElementById('password').value;
    const ok=v.length>=8;
    const isPure=/^\d+$/.test(v)||/^[a-zA-Z]+$/.test(v);
    const hint=document.getElementById('pwHint');
    if(v.length>0&&v.length<8)hint.textContent='密码至少需要 8 个字符';
    else if(v.length>=8&&isPure)hint.textContent='密码不能为纯数字或纯字母';
    else hint.textContent='密码至少需要 8 个字符';
    showHint('pwHint',!ok||(v.length>=8&&isPure));
    markInput('password',(!ok||isPure)&&v.length>0);
    return ok&&!isPure;
}

async function handleSignUp(){
    const btn=document.getElementById('submitBtn');
    const name=document.getElementById('name').value.trim();
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value;
    if(!validateName())return showMsg('请输入姓名','error');
    if(!validateEmail())return showMsg('请输入有效的邮箱地址','error');
    if(!validatePw())return showMsg('请按要求设置密码','error');
    btn.disabled=true;btn.textContent='注册中...';showMsg('','');
    try{
        const r=await fetch(API+'/api/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password})});
        const d=await r.json();
        if(!r.ok){showMsg(d.error||'注册失败','error');btn.disabled=false;btn.textContent='开始免费试用';return}
        localStorage.setItem('token',d.token);localStorage.setItem('user',JSON.stringify(d.user));
        showMsg('注册成功！正在跳转...','success');
        setTimeout(()=>{location.href=d.user.role==='admin'?'admin.html':'dashboard.html'},800);
    }catch{showMsg('网络错误，请检查连接后重试','error');btn.disabled=false;btn.textContent='开始免费试用'}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')handleSignUp()});
</script>
</body>
</html>
