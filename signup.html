<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Jasper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --primary:#725BFF;--primary-hover:#5F47E0;--cta:#FF6B35;
            --text-dark:#0F172A;--text-light:#64748B;
            --bg-light:#F8FAFC;--border:#E2E8F0;--white:#FFFFFF
        }
        body{font-family:'Inter',sans-serif;color:var(--text-dark);background:#FAFBFC;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
        .page{display:flex;width:100%;max-width:1040px;background:var(--white);border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,0.06);overflow:hidden}
        
        /* Left brand panel */
        .brand-panel{flex:1;background:linear-gradient(135deg,#725BFF,#5F47E0);color:var(--white);padding:64px 48px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
        .brand-panel::after{content:'';position:absolute;top:-50%;right:-50%;width:100%;height:100%;background:rgba(255,255,255,0.05);border-radius:50%}
        .brand-panel::before{content:'';position:absolute;bottom:-30%;left:-30%;width:80%;height:80%;background:rgba(255,255,255,0.03);border-radius:50%}
        .brand-logo{position:relative;z-index:1;font-size:28px;font-weight:700;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--white)}
        .brand-logo-dot{width:10px;height:10px;border-radius:50%;background:var(--white)}
        .brand-text{position:relative;z-index:1}
        .brand-text h2{font-size:32px;font-weight:700;line-height:1.3;margin-bottom:12px}
        .brand-text p{font-size:16px;opacity:0.85;line-height:1.6}
        .brand-features{position:relative;z-index:1;display:flex;flex-direction:column;gap:16px}
        .brand-feature{display:flex;align-items:center;gap:12px;font-size:15px}
        .brand-check{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .brand-check svg{width:14px;height:14px}

        /* Right form panel */
        .form-panel{flex:1;padding:64px 64px 64px 56px;display:flex;flex-direction:column;justify-content:center}
        .form-panel h1{font-size:28px;font-weight:700;margin-bottom:8px}
        .form-panel .subtitle{color:var(--text-light);font-size:15px;margin-bottom:36px}
        .form-group{margin-bottom:20px}
        .form-group label{display:block;font-size:14px;font-weight:600;margin-bottom:6px;color:var(--text-dark)}
        .form-group input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;color:var(--text-dark);transition:border-color .2s,box-shadow .2s;outline:none}
        .form-group input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(114,91,255,0.1)}
        .form-group input::placeholder{color:#94A3B8}
        .form-row{display:flex;gap:16px}
        .form-row .form-group{flex:1}
        .btn{width:100%;padding:14px 24px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-family:inherit;margin-top:8px}
        .btn-primary{background:var(--primary);color:var(--white)}
        .btn-primary:hover{background:var(--primary-hover);transform:translateY(-1px);box-shadow:0 4px 12px rgba(114,91,255,0.3)}
        .btn-google{background:var(--white);color:var(--text-dark);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:10px;margin-top:16px}
        .btn-google:hover{background:var(--bg-light)}
        .divider{display:flex;align-items:center;gap:16px;margin:24px 0;color:var(--text-light);font-size:13px}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
        .form-footer{text-align:center;margin-top:24px;font-size:14px;color:var(--text-light)}
        .form-footer a{color:var(--primary);text-decoration:none;font-weight:600;cursor:pointer}
        .form-footer a:hover{text-decoration:underline}

        /* Mobile */
        @media(max-width:768px){
            .page{flex-direction:column;max-width:420px}
            .brand-panel{padding:40px 32px;text-align:center}
            .brand-features{display:none}
            .brand-text h2{font-size:24px}
            .form-panel{padding:32px 32px 48px}
            .form-row{flex-direction:column;gap:0}
        }
    </style>
</head>
<body>
<div class="page">
    <!-- Left brand panel -->
    <div class="brand-panel">
        <a href="index.html" class="brand-logo">Jasper<span class="brand-logo-dot"></span></a>
        <div class="brand-text">
            <h2>Start your 7-day free trial</h2>
            <p>Join 100,000+ marketing teams already using Jasper to scale their content.</p>
        </div>
        <div class="brand-features">
            <div class="brand-feature">
                <div class="brand-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
                No credit card required
            </div>
            <div class="brand-feature">
                <div class="brand-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
                Full access to all Pro features
            </div>
            <div class="brand-feature">
                <div class="brand-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
                Cancel anytime
            </div>
        </div>
    </div>

    <!-- Right form -->
    <div class="form-panel">
        <h1>Create your account</h1>
        <p class="subtitle">Get started with a free trial.</p>

        <button class="btn btn-google" onclick="demoAlert('Google Sign Up','Demo: Sign up with Google OAuth.')">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Sign up with Google
        </button>

        <div class="divider">or sign up with email</div>

        <div class="form-row">
            <div class="form-group">
                <label>First name</label>
                <input type="text" placeholder="John" id="firstName">
            </div>
            <div class="form-group">
                <label>Last name</label>
                <input type="text" placeholder="Doe" id="lastName">
            </div>
        </div>

        <div class="form-group">
            <label>Work email</label>
            <input type="email" placeholder="john@company.com" id="email">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="At least 8 characters" id="password">
        </div>

        <button class="btn btn-primary" onclick="handleSignUp()">Start free trial</button>

        <p class="form-footer">
            Already have an account? <a href="signin.html">Sign in</a>
        </p>
    </div>
</div>

<script>
function handleSignUp() {
    const fn = document.getElementById('firstName').value.trim();
    const ln = document.getElementById('lastName').value.trim();
    const email = document.getElementById('email').value.trim();
    const pw = document.getElementById('password').value;
    if (!fn || !ln) return alert('Please enter your name.');
    if (!email) return alert('Please enter your email.');
    if (!pw || pw.length < 8) return alert('Password must be at least 8 characters.');
    alert('🎉 Account created!\n\nWelcome, ' + fn + '!\n\nDemo: In production, this would send a verification email and redirect to onboarding.\n\nEmail: ' + email);
    window.location.href = 'dashboard.html';
}
function demoAlert(title, msg) {
    alert('📋 ' + title + '\n\n' + msg);
}
</script>
</body>
</html>
