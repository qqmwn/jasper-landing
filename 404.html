<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>404 — Jasper</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#725BFF;--text-dark:#0F172A;--text-light:#64748B}
body{font-family:'Inter',sans-serif;color:var(--text-dark);min-height:100vh;display:flex;align-items:center;justify-content:center;background:#FAFBFC;padding:24px}
.card{text-align:center;max-width:400px}
.card h1{font-size:72px;font-weight:700;color:var(--primary);line-height:1}
.card h2{font-size:22px;font-weight:700;margin:16px 0 8px}
.card p{color:var(--text-light);font-size:15px;margin-bottom:32px}
.btn{padding:12px 32px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit;background:var(--primary);color:#fff;text-decoration:none;display:inline-block;transition:all .2s}
.btn:hover{background:#5F47E0}
</style>
</head>
<body>
<div class="card">
    <h1>404</h1>
    <h2>页面未找到</h2>
    <p>你访问的页面不存在或已被移除。</p>
    <a href="/" class="btn">返回首页</a>
</div>
</body>
</html>
