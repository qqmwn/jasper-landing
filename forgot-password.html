<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>忘记密码 — Jasper</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#725BFF;--primary-hover:#5F47E0;--text-dark:#0F172A;--text-light:#64748B;--bg-light:#F8FAFC;--border:#E2E8F0;--white:#FFFFFF;--error:#EF4444;--success:#22C55E}
body{font-family:'Inter',sans-serif;color:var(--text-dark);background:#FAFBFC;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--white);border-radius:20px;padding:48px;max-width:440px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.06);text-align:center}
.card h1{font-size:24px;font-weight:700;margin-bottom:8px}
.card .sub{color:var(--text-light);font-size:14px;margin-bottom:32px}
.msg{display:none;padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px;font-weight:500}
.msg.error{display:block;background:#FEF2F2;color:var(--error);border:1px solid #FECACA}
.msg.success{display:block;background:#F0FDF4;color:var(--success);border:1px solid #BBF7D0}
.form-group{margin-bottom:20px;text-align:left}
.form-group label{display:block;font-size:14px;font-weight:600;margin-bottom:6px}
.form-group input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(114,91,255,0.1)}
.btn{width:100%;padding:14px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;border:none;font-family:inherit;background:var(--primary);color:var(--white);transition:all .2s}
.btn:hover{background:var(--primary-hover)}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.back{display:block;text-align:center;margin-top:20px;font-size:14px;color:var(--primary);text-decoration:none;font-weight:600}
.back:hover{text-decoration:underline}
#step2{display:none}
.token-box{background:var(--bg-light);border-radius:10px;padding:16px;font-size:13px;color:var(--text-light);margin-bottom:20px;word-break:break-all;font-family:monospace;font-size:12px}
</style>
</head>
<body>
<div class="card">
    <h1>找回密码</h1>
    <p class="sub">输入注册邮箱，获取重置链接</p>
    <div class="msg" id="msg"></div>

    <div id="step1">
        <div class="form-group">
            <label>注册邮箱</label>
            <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
        </div>
        <button class="btn" id="btn" onclick="handleForgot()">发送重置链接</button>
    </div>

    <div id="step2">
        <p style="font-size:14px;margin-bottom:12px;color:var(--text-dark);text-align:left">重置令牌（演示环境直接返回）：</p>
        <div class="token-box" id="tokenDisplay"></div>
        <div class="form-group">
            <label>新密码</label>
            <input type="password" id="newPassword" placeholder="至少8位，不能纯数字或纯字母">
        </div>
        <button class="btn" id="btn2" onclick="handleReset()">重置密码</button>
    </div>

    <a href="signin.html" class="back">← 返回登录</a>
</div>

<script>
const API='';
function show(t,e){const m=document.getElementById('msg');m.textContent=t;m.className='msg '+e}

async function handleForgot(){
    const email=document.getElementById('email').value.trim();
    if(!email)return show('请输入邮箱地址','error');
    const btn=document.getElementById('btn');btn.disabled=true;btn.textContent='发送中...';
    try{
        const r=await fetch(API+'/api/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
        const d=await r.json();
        if(!r.ok){show(d.error,'error');btn.disabled=false;btn.textContent='发送重置链接';return}
        document.getElementById('step1').style.display='none';
        document.getElementById('step2').style.display='block';
        document.getElementById('tokenDisplay').textContent=d.token||'（已在控制台输出）';
        show('重置令牌已生成，请输入新密码','success');
    }catch{show('网络错误','error');btn.disabled=false;btn.textContent='发送重置链接'}
}

async function handleReset(){
    const token=document.getElementById('tokenDisplay').textContent.trim();
    const password=document.getElementById('newPassword').value;
    if(!password||password.length<8)return show('新密码至少需要8个字符','error');
    const btn=document.getElementById('btn2');btn.disabled=true;btn.textContent='重置中...';
    try{
        const r=await fetch(API+'/api/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password})});
        const d=await r.json();
        if(!r.ok){show(d.error,'error');btn.disabled=false;btn.textContent='重置密码';return}
        show('密码已重置！3秒后跳转登录页','success');
        setTimeout(()=>location.href='signin.html',3000);
    }catch{show('网络错误','error');btn.disabled=false;btn.textContent='重置密码'}
}
</script>
</body>
</html>
