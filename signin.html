<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — Jasper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --primary:#725BFF;--primary-hover:#5F47E0;--cta:#FF6B35;
            --text-dark:#0F172A;--text-light:#64748B;
            --bg-light:#F8FAFC;--border:#E2E8F0;--white:#FFFFFF;
            --error:#EF4444;--success:#22C55E
        }
        body{font-family:'Inter',sans-serif;color:var(--text-dark);background:#FAFBFC;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
        .page{display:flex;width:100%;max-width:1040px;background:var(--white);border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,0.06);overflow:hidden}
        .brand-panel{flex:1;background:linear-gradient(135deg,#5F47E0,#4C1D95);color:var(--white);padding:64px 48px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
        .brand-panel::after{content:'';position:absolute;top:-50%;right:-50%;width:100%;height:100%;background:rgba(255,255,255,0.05);border-radius:50%}
        .brand-logo{position:relative;z-index:1;font-size:28px;font-weight:700;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--white)}
        .brand-logo-dot{width:10px;height:10px;border-radius:50%;background:var(--white)}
        .brand-text{position:relative;z-index:1}
        .brand-text h2{font-size:32px;font-weight:700;line-height:1.3;margin-bottom:12px}
        .brand-text p{font-size:16px;opacity:0.85;line-height:1.6}
        .brand-quote{position:relative;z-index:1;background:rgba(255,255,255,0.1);border-radius:16px;padding:24px;backdrop-filter:blur(4px)}
        .brand-quote blockquote{font-size:15px;line-height:1.6;font-style:italic;margin-bottom:12px;opacity:0.95}
        .brand-quote cite{font-size:13px;font-style:normal;opacity:0.8}
        .form-panel{flex:1;padding:64px 64px 64px 56px;display:flex;flex-direction:column;justify-content:center}
        .form-panel h1{font-size:28px;font-weight:700;margin-bottom:8px}
        .form-panel .subtitle{color:var(--text-light);font-size:15px;margin-bottom:36px}
        .form-group{margin-bottom:20px;position:relative}
        .form-group label{display:block;font-size:14px;font-weight:600;margin-bottom:6px;color:var(--text-dark)}
        .form-group input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;color:var(--text-dark);transition:border-color .2s,box-shadow .2s;outline:none}
        .form-group input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(114,91,255,0.1)}
        .form-group input.input-error{border-color:var(--error);box-shadow:0 0 0 3px rgba(239,68,68,0.1)}
        .form-group input::placeholder{color:#94A3B8}
        .field-hint{font-size:12px;color:var(--error);margin-top:4px;display:none}
        .field-hint.show{display:block}
        .btn{width:100%;padding:14px 24px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-family:inherit;margin-top:8px}
        .btn-primary{background:var(--primary);color:var(--white)}
        .btn-primary:hover{background:var(--primary-hover);transform:translateY(-1px);box-shadow:0 4px 12px rgba(114,91,255,0.3)}
        .btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none;box-shadow:none}
        .form-footer{text-align:center;margin-top:24px;font-size:14px;color:var(--text-light)}
        .form-footer a{color:var(--primary);text-decoration:none;font-weight:600;cursor:pointer}
        .form-footer a:hover{text-decoration:underline}
        .msg{display:none;padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px;font-weight:500}
        .msg.error{display:block;background:#FEF2F2;color:var(--error);border:1px solid #FECACA}
        .msg.success{display:block;background:#F0FDF4;color:var(--success);border:1px solid #BBF7D0}
        @media(max-width:768px){
            .page{flex-direction:column;max-width:420px}
            .brand-panel{padding:40px 32px}
            .brand-quote{margin-top:24px}
            .brand-text h2{font-size:24px}
            .form-panel{padding:32px 32px 48px}
        }
    </style>
</head>
<body>
<div class="page">
    <div class="brand-panel">
        <a href="index.html" class="brand-logo">Jasper<span class="brand-logo-dot"></span></a>
        <div class="brand-text">
            <h2>欢迎回来</h2>
            <p>登录后继续使用 AI 创作精彩内容。</p>
        </div>
        <div class="brand-quote">
            <blockquote>"Jasper 帮助我们将内容产量提升了 10 倍，同时在所有渠道保持了品牌声量。"</blockquote>
            <cite>— 陈总，市场副总裁</cite>
        </div>
    </div>

    <div class="form-panel">
        <h1>登录 Jasper</h1>
        <p class="subtitle">输入账号信息继续使用</p>

        <div class="msg" id="msg"></div>

        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="email" placeholder="admin@jasper.local" autocomplete="email" oninput="validateEmail()" onblur="validateEmail()">
            <div class="field-hint" id="emailHint">请输入有效的邮箱地址</div>
        </div>

        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="输入密码" autocomplete="current-password" oninput="validatePw()">
            <div class="field-hint" id="pwHint">请输入密码</div>
        </div>

        <div style="text-align:right;margin-bottom:16px">
            <a href="forgot-password.html" style="font-size:13px;color:var(--primary);text-decoration:none;font-weight:600">忘记密码？</a>
        </div>

        <button class="btn btn-primary" id="submitBtn" onclick="handleSignIn()">登录</button>

        <p class="form-footer">
            还没有账号？ <a href="signup.html">免费注册</a>
        </p>
    </div>
</div>

<script>
const API='';
function showMsg(t,e){const m=document.getElementById('msg');m.textContent=t;m.className='msg '+e}
function showHint(id,show){document.getElementById(id).classList.toggle('show',!!show)}
function markInput(id,err){const el=document.getElementById(id);el.classList.toggle('input-error',!!err)}

function validateEmail(){
    const v=document.getElementById('email').value.trim();
    const ok=v&&/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    showHint('emailHint',!ok);markInput('email',!ok&&v.length>0);return ok
}
function validatePw(){
    const v=document.getElementById('password').value;
    const ok=v.length>0;
    showHint('pwHint',!ok);markInput('password',!ok);return ok
}

async function handleSignIn(){
    const btn=document.getElementById('submitBtn');
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value;
    if(!validateEmail())return showMsg('请输入有效的邮箱地址','error');
    if(!validatePw())return showMsg('请输入密码','error');
    btn.disabled=true;btn.textContent='登录中...';showMsg('','');
    try{
        const r=await fetch(API+'/api/signin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
        const d=await r.json();
        if(!r.ok){showMsg(d.error||'登录失败','error');btn.disabled=false;btn.textContent='登录';return}
        localStorage.setItem('token',d.token);localStorage.setItem('user',JSON.stringify(d.user));
        showMsg('登录成功！正在跳转...','success');
        setTimeout(()=>{location.href=d.user.role==='admin'?'admin.html':'dashboard.html'},800);
    }catch{showMsg('网络错误，请检查连接后重试','error');btn.disabled=false;btn.textContent='登录'}
}
// Enter key submit
document.addEventListener('keydown',e=>{if(e.key==='Enter')handleSignIn()});
</script>
</body>
</html>
